# Policy rules for Stage2/Stage3 gating
extract_422_threshold: 1
extract_422_cooldown_sec: 300
low_score_threshold: 0.2
critical_missing_keys:
  - dxy
  - bdi
  - rrr
  - mlf
block_on_stale: true
critical_stale_keys:
  - cpi
  - ppi
  - pmi
  - m1
  - m2
  - tsf
min_trading_days: 100
estimated_allowlist_keys: ["CN10Y_CDB", "bdi"]
bdi_estimated_allow_conditions: {"trusted_domains": ["balticexchange.com", "tradingeconomics.com", "investing.com", "eastmoney.com"], "max_age_days": 2, "value_range": [200.0, 10000.0], "unit_keywords": ["点", "point", "points"]}
non_blocking_warning: {"gc_f_risk_domains": ["guba.eastmoney.com"], "gc_f_anomaly_threshold_pct": 8.0}
